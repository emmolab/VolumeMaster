<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 288px;
        height: 80px;
        background: transparent;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
        -webkit-app-region: no-drag;
      }
      #card {
        width: 100%;
        height: 100%;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px 0 12px;
        opacity: 0;
        transition: opacity 0.18s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      }
      #card.visible { opacity: 1; }
      #text {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
      }
      #knob-label {
        color: #818cf8;
        font-weight: 700;
        font-size: 13px;
        line-height: 1.2;
      }
      #app-label {
        color: #64748b;
        font-size: 11px;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pct {
        color: #e2e8f0;
        font-weight: 700;
        font-size: 20px;
        flex-shrink: 0;
        letter-spacing: -0.5px;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <svg viewBox="0 0 32 32" width="44" height="44" style="flex-shrink:0">
        <!-- Background track: 270° arc from 7 o'clock to 5 o'clock -->
        <path
          d="M 8.22 23.78 A 11 11 0 1 1 23.78 23.78"
          fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"
        />
        <!-- Value arc -->
        <path
          id="val-arc" d=""
          fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round"
        />
      </svg>
      <div id="text">
        <span id="knob-label">Knob 1</span>
        <span id="app-label"></span>
      </div>
      <span id="pct">0%</span>
    </div>

    <script>
      function getArcPath(value) {
        if (value <= 0) return '';
        const cx = 16, cy = 16, r = 11;
        const toRad = (d) => (d * Math.PI) / 180;
        const startAngle = 225;
        const sweep = 270 * (value / 100);
        const endAngle = startAngle + sweep;
        const sx = cx + r * Math.sin(toRad(startAngle));
        const sy = cy - r * Math.cos(toRad(startAngle));
        const ex = cx + r * Math.sin(toRad(endAngle));
        const ey = cy - r * Math.cos(toRad(endAngle));
        return `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${r} ${r} 0 ${sweep > 180 ? 1 : 0} 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
      }

      const card = document.getElementById('card');

      window.notif.onShow(({ index, value, label }) => {
        document.getElementById('val-arc').setAttribute('d', getArcPath(value));
        document.getElementById('knob-label').textContent = `Knob ${index}`;
        document.getElementById('app-label').textContent = label || '';
        document.getElementById('pct').textContent = `${value}%`;
        card.classList.add('visible');
      });

      window.notif.onHide(() => {
        card.classList.remove('visible');
      });
    </script>
  </body>
</html>
