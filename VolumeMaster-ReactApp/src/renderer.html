<!doctype html>
<html lang="en" class="bg-slate-900 text-gray-300">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="output.css" rel="stylesheet" />
    <title>VolumeMaster</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 1rem;
        height: 100vh;
        overflow: hidden;
      }

      /* Shared scrollbar style */
      .custom-scroll {
        scrollbar-width: thin;
        scrollbar-color: #6366f1 transparent;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #6366f1;
        border-radius: 3px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      #knobsAppsContainer {
        justify-content: center;
        min-height: 250px;
      }

      /* Notifications are fixed so they don't affect layout */
      #alertContainer {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 50;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 20rem;
        pointer-events: none;
      }
      #alertContainer > * {
        pointer-events: auto;
      }
    </style>
  </head>

  <body class="flex flex-col h-screen">
    <!-- Tabs -->
    <div
      class="flex justify-center mb-4 gap-6 border-b border-slate-700 shrink-0"
    >
      <button
        id="tabMappings"
        class="tab-button pb-2 text-indigo-400 border-b-2 border-indigo-400 font-semibold text-sm"
      >
        Knob Mappings
      </button>
      <button
        id="tabSettings"
        class="tab-button pb-2 text-slate-500 hover:text-indigo-400 text-sm"
      >
        Settings
      </button>
    </div>

    <!-- Mappings Tab -->
    <!-- Mappings Tab -->
    <div id="tabContentMappings" class="flex flex-col min-h-0 grow">
      <!-- Sub Tabs -->
      <div class="flex gap-4 border-b border-slate-700 mb-3 shrink-0">
        <button
          id="subTabApps"
          class="pb-1.5 text-xs font-semibold text-indigo-400 border-b-2 border-indigo-400 transition"
        >
          Applications
        </button>
        <button
          id="subTabDevices"
          class="pb-1.5 text-xs font-semibold text-slate-500 hover:text-indigo-400 transition"
        >
          Input Devices
        </button>
      </div>

      <!-- Applications Panel -->
      <div id="subContentApps" class="flex flex-col min-h-0 shrink-0">
        <div class="flex items-center gap-3 w-full mb-2">
          <input
            id="processSearch"
            type="text"
            placeholder="Search running apps..."
            class="flex-1 mt-2 min-w-0 p-1.5 text-sm border border-slate-700 rounded bg-slate-800 text-gray-300 placeholder-slate-500 focus:outline-indigo-400 focus:ring-1 focus:ring-indigo-400"
          />
          <select
            id="processFilter"
            class="p-1.5 text-sm border border-slate-700 rounded bg-slate-800 text-gray-300 focus:outline-indigo-400 focus:ring-1 focus:ring-indigo-400"
          >
            <option value="gui">GUI</option>
            <option value="all">All</option>
          </select>
        </div>
        <div
          id="processList"
          class="custom-scroll mt-2 flex flex-wrap gap-1 overflow-y-auto max-h-24"
        ></div>
      </div>

      <!-- Input Devices Panel -->
      <div
        id="subContentDevices"
        class="hidden flex flex-col shrink-0"
        style="height: 7rem"
      >
        <div
          id="inputDeviceList"
          class="custom-scroll flex flex-col gap-2 overflow-y-auto h-full"
        ></div>
      </div>

      <!-- Knobs (always visible) -->
      <div
        id="knobsAppsContainer"
        class="custom-scroll flex flex-wrap gap-4 overflow-y-auto pb-2 mt-3 mb-3 grow items-start"
      ></div>

      <button
        id="saveAndRunBtn"
        class="shrink-0 w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition text-sm font-semibold shadow-md"
      >
        Save and Run
      </button>
    </div>

    <!-- Settings Tab -->
    <div
      id="tabContentSettings"
      class="hidden max-w-3xl w-full px-4 mx-auto grow overflow-y-auto space-y-4 custom-scroll"
    >
      <div class="bg-slate-800 rounded-lg shadow p-4 border border-slate-700">
        <h2 class="text-lg font-semibold text-indigo-400 mb-4">
          Device Settings
        </h2>
        <label
          for="comPortSelect"
          class="block mb-1 font-medium text-gray-400 text-sm"
          >Select COM Port</label
        >
        <select
          id="comPortSelect"
          class="w-full p-2 text-sm border border-slate-700 rounded bg-slate-900 text-gray-300 focus:outline-indigo-400 focus:ring-1 focus:ring-indigo-400"
        >
          <option disabled selected>Loading...</option>
        </select>
      </div>

      <div class="bg-slate-800 rounded-lg shadow p-4 border border-slate-700">
        <h2 class="text-lg font-semibold text-indigo-400 mb-4">VoiceMeeter</h2>
        <button
          id="vmEnableButton"
          class="w-full mb-4 p-2 text-sm border border-slate-700 rounded bg-slate-900 text-gray-300 hover:bg-slate-800 focus:outline-indigo-400 transition"
          data-enabled="false"
        >
          Disabled
        </button>
        <label
          for="vmVersionSelect"
          class="block mb-1 font-medium text-gray-400 text-sm"
          >Select VoiceMeeter Version</label
        >
        <select
          id="vmVersionSelect"
          class="w-full p-2 text-sm border border-slate-700 rounded bg-slate-900 text-gray-300 focus:outline-indigo-400 focus:ring-1 focus:ring-indigo-400"
        >
          <option value="standard">VoiceMeeter Standard</option>
          <option value="banana">VoiceMeeter Banana</option>
          <option value="potato">VoiceMeeter Potato</option>
        </select>
      </div>

      <div class="bg-slate-800 rounded-lg shadow p-4 border border-slate-700">
        <h2 class="text-lg font-semibold text-indigo-400 mb-4">Startup</h2>
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <input
            type="checkbox"
            id="autoStartCheckbox"
            class="w-4 h-4 accent-indigo-500"
          />
          <span class="text-sm text-gray-300"
            >Auto Start on Windows Startup</span
          >
        </label>
        <p class="text-xs text-slate-500 mt-2">
          Launch VolumeMaster automatically when Windows starts.
        </p>
      </div>
    </div>

    <!-- Notifications (fixed, won't affect layout) -->
    <div id="alertContainer"></div>

    <script src="renderer.js"></script>
  </body>
</html>
